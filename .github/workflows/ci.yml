name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

defaults:
  run:
    working-directory: collab-web

jobs:
  quality:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: collab-web/package-lock.json

      - name: Install collab-web dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_build
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build WebSocket server
        run: npm run build
        working-directory: backend

  e2e:
    name: Playwright e2e
    needs: quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: collab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d collab_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/collab_test
      NEXTAUTH_SECRET: ci-e2e-nextauth-secret
      WS_INTERNAL_SECRET: ci-e2e-internal-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:1234
      WS_SERVER_HTTP_URL: http://127.0.0.1:1234

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: collab-web/package-lock.json

      - name: Install collab-web dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database schema
        run: npx prisma db push --skip-generate

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
